<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SIARSIPARIS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4fa; --s0:#ffffff; --s1:#f7f9fd;
  --border:#d4ddef;
  --blue:#1a56db; --cyan:#0891b2;
  --green:#059669;
  --red:#dc2626;
  --txt:#0f172a; --txt2:#475569; --txt3:#94a3b8;
  --shadow:0 2px 8px rgba(15,23,42,.1),0 8px 24px rgba(15,23,42,.07);
  --mono:'IBM Plex Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--txt);
  font-family:var(--sans);
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* background grid pattern */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity:.4;
  z-index:0;
}

.card {
  position:relative;
  z-index:1;
  background:var(--s0);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px 36px 36px;
  width:100%;
  max-width:380px;
  box-shadow:var(--shadow);
}

.brand {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:32px;
}
.brand-sq {
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:12px;color:#fff;
  box-shadow:0 3px 10px rgba(26,86,219,.3);
  flex-shrink:0;
  letter-spacing:-.5px;
}
.brand-name {
  font-family:var(--mono);
  font-size:14px;font-weight:700;
  color:var(--txt);letter-spacing:.06em;
}
.brand-desc {
  font-size:9px;color:var(--txt3);
  letter-spacing:.1em;margin-top:2px;
}

h1 {
  font-size:18px;font-weight:700;
  color:var(--txt);margin-bottom:4px;
}
.subtitle {
  font-size:12px;color:var(--txt3);
  margin-bottom:28px;
}

.field {
  margin-bottom:16px;
}
label {
  display:block;
  font-size:11px;font-weight:600;
  color:var(--txt2);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:6px;
}
input {
  width:100%;
  padding:10px 13px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-family:var(--sans);
  font-size:13px;
  color:var(--txt);
  background:var(--s1);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(26,86,219,.12);
  background:#fff;
}
input::placeholder { color:var(--txt3); }

.pw-wrap { position:relative; }
.pw-toggle {
  position:absolute;right:11px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;
  cursor:pointer;font-size:14px;
  color:var(--txt3);padding:2px;
  line-height:1;
}

.err {
  display:none;
  background:#fef2f2;
  border:1px solid #fecaca;
  border-radius:8px;
  padding:10px 13px;
  font-size:12px;
  color:var(--red);
  margin-bottom:16px;
}
.err.show { display:flex; align-items:center; gap:7px; }

.btn {
  width:100%;
  padding:11px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:8px;
  font-family:var(--sans);
  font-size:13px;font-weight:600;
  cursor:pointer;
  transition:background .15s, transform .1s;
  margin-top:4px;
  letter-spacing:.02em;
}
.btn:hover { background:#1345c0; }
.btn:active { transform:scale(.98); }
.btn:disabled { background:var(--txt3); cursor:not-allowed; transform:none; }

.divider {
  display:flex;align-items:center;gap:10px;
  margin:14px 0;
}
.divider::before,.divider::after {
  content:'';flex:1;
  height:1px;background:var(--border);
}
.divider span {
  font-size:11px;color:var(--txt3);
}

.btn-guest {
  width:100%;
  padding:11px;
  background:transparent;
  color:var(--txt2);
  border:1.5px solid var(--border);
  border-radius:8px;
  font-family:var(--sans);
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:background .15s, border-color .15s, transform .1s;
  letter-spacing:.02em;
}
.btn-guest:hover { background:var(--s1); border-color:var(--txt3); color:var(--txt); }
.btn-guest:active { transform:scale(.98); }

.footer {
  text-align:center;
  margin-top:24px;
  font-size:10px;
  color:var(--txt3);
  font-family:var(--mono);
  letter-spacing:.06em;
}
.dot-live {
  display:inline-block;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--green);
  margin-right:5px;
  animation:blink 2s infinite;
  vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-sq">SA</div>
    <div>
      <div class="brand-name">SIARSIPARIS</div>
      <div class="brand-desc">SISTEM INFORMASI ARSIPARIS · ANRI</div>
    </div>
  </div>

  <h1>Masuk ke Dashboard</h1>
  <p class="subtitle">Silakan login untuk mengakses data arsiparis.</p>

  <div class="err" id="errMsg">⚠ Username atau password salah.</div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" autofocus />
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" />
      <button class="pw-toggle" onclick="togglePw()" tabindex="-1" id="pwEye">👁</button>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Masuk sebagai Admin</button>

  <div class="divider">
    <span>atau</span>
  </div>

  <button class="btn-guest" onclick="doGuest()">👤 Masuk sebagai Tamu</button>

  <div class="footer">
    <span class="dot-live"></span>DATA AKTIF · ARSIP NASIONAL RI
  </div>

</div>

<script>
const USERS = [
  { username: 'admin', password: 'arsip123' }
];

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');

  err.classList.remove('show');

  const match = USERS.find(x => x.username === u && x.password === p);
  if (match) {
    btn.disabled = true;
    btn.textContent = 'Memuat…';
    localStorage.setItem('siarsiparis_auth', '1');
    localStorage.setItem('siarsiparis_user', u);
    localStorage.setItem('siarsiparis_role', 'admin');
    window.location.replace('index.html');
  } else {
    err.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}

function doGuest() {
  localStorage.setItem('siarsiparis_auth', '1');
  localStorage.setItem('siarsiparis_user', 'Tamu');
  localStorage.setItem('siarsiparis_role', 'guest');
  window.location.replace('index.html');
}

function togglePw() {
  const inp = document.getElementById('password');
  const eye = document.getElementById('pwEye');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.textContent = '🙈';
  } else {
    inp.type = 'password';
    eye.textContent = '👁';
  }
}

// Enter key support
document.addEventListener('keydown', function(e){
  if (e.key === 'Enter') doLogin();
});

// If already logged in, skip login
if (localStorage.getItem('siarsiparis_auth') === '1') {
  window.location.replace('index.html');
}
</script>

</body>
</html>
